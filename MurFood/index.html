<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <div class="section">
            <div class="left">
                <img src="src/MurFood Logo2.png" alt="Oops">
                <a href="">About</a>
            </div>
            <div class="right">
                <img src="src/Profile.png" alt="Oops">
            </div>
        </div>


        <div class="description">
            <div class="text">
                <p>MurFood is a service that delivers fresh, appetizing meals for every day.</p>
            </div>

            <div class="rightpart">
                <img src="src/Sandwich.jpe" alt="">
                <button class="menu-btn">menu</button>
            </div>
        </div>


        <div class="top3-section">
            <p>top 3 our food</p>
        </div>


        <div class="cards">
            <div class="card">
                <p class="p1">1st</p>
                <img src="src/specialPasta.jpe" alt="">
                <p class="p2">special pasta</p>
            </div>


            <div class="card">
                <p class="p1">2nd</p>
                <img src="src/makaronyi.jpg" alt="">
                <p class="p2">pasta</p>
            </div>


            <div class="card">
                <p class="p1">3rd</p>
                <img src="src/sandwich1.webp" alt="">
                <p class="p2">sandwich in dutch</p>
            </div>
        </div>
    </header>


    
    <script src="main.js"></script>

</html>
